   App__RabbitMQ__Library__BookBorrow__QueueName: book.borrow.queue
   App__RabbitMQ__Library__BookBorrow__RoutingKey: book.borrow.key
   App__RabbitMQ__Library__BookReturn__QueueName: book.return.queue
   App__RabbitMQ__Library__BookReturn__RoutingKey: book.return.key
   App__RabbitMQ__Library__ReaderCreate__QueueName: reader.create.queue
   App__RabbitMQ__Library__ReaderCreate__RoutingKey: reader.create.key
   App__RabbitMQ__Library__ReaderClose__QueueName: reader.close.queue
   App__RabbitMQ__Library__ReaderClose__RoutingKey: reader.close.key
